<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Portal</title>
    <style>
      body { font-family: sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
      nav { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
      nav a { margin-right: 15px; text-decoration: none; color: blue; }
      .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 5px; }
      .btn { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 3px; }
      .btn-secondary { background: #6c757d; }
      input, select, textarea { display: block; width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
      .error { color: red; margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
